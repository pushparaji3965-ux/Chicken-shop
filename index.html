<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMD Duck Market Pro</title>
    <style>
        body { 
            background-color: #0b0c10; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; margin: 0; padding: 0; display: flex; flex-direction: column; 
            justify-content: space-between; align-items: center; height: 100vh; 
            user-select: none; -webkit-user-select: none; overflow: hidden;
        }
        .header { width: 100%; padding-top: 15px; background: rgba(0,0,0,0.6); display: flex; justify-content: space-around; font-size: 16px; font-weight: bold; }
        .stat-box { background: #1f2833; padding: 6px 12px; border-radius: 10px; border: 1px solid #ffcc00; }
        
        .card-container {
            background: #1f2833; width: 85%; max-width: 340px; border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8); border: 2px solid #ffcc00; position: relative; margin-top: 15px;
        }
        .badge { position: absolute; top: 12px; left: 12px; background: #c5a059; color: #000; font-weight: bold; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
        .duck-price { position: absolute; top: 12px; right: 12px; color: #00ffcc; font-weight: bold; font-size: 11px; }
        
        .duck-avatar { font-size: 90px; margin: 15px 0 10px 0; transition: transform 0.05s ease; cursor: pointer; }
        .duck-avatar:active { transform: scale(0.9); }
        
        .feed-btn {
            background: linear-gradient(135deg, #ffcc00, #ff9900); color: #000; border: none;
            padding: 12px 0; font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; margin-bottom: 10px;
        }

        /* அசல் மார்க்கெட் பேனல் (கைடு பக்கம் 18 & 19) */
        .market-panel { background: #151a21; width: 85%; padding: 12px; border-radius: 15px; border: 1px solid #232d38; margin-bottom: 15px; }
        .market-title { font-size: 13px; color: #ffcc00; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
        .market-actions { display: flex; gap: 10px; justify-content: center; }
        .market-btn { background: #1f2833; color: #fff; border: 1px solid #ffcc00; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; flex: 1; }
        .market-btn.sell { border-color: #ff4d4d; color: #ff4d4d; }

        .floating-text { position: absolute; color: #00ffcc; font-weight: bold; font-size: 20px; animation: floatUp 0.5s ease-out forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }

        .footer-nav { background: #151a21; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #232d38; }
        .nav-item { font-size: 11px; color: #66788a; font-weight: bold; }
        .nav-item.active { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-box" style="color: #ffcc00;">🪙 <span id="dmd-val">0.00</span></div>
        <div class="stat-box" style="color: #ff9900;">🌽 <span id="corn-val">500</span></div>
    </div>

    <div class="card-container" id="card">
        <div class="badge" id="duck-rarity">COMMON</div>
        <div class="duck-price">VALUE: <span id="duck-value">150</span> 🌽</div>
        
        <div class="duck-avatar" onclick="feedDuck(event)">🦆</div>
        
        <button class="feed-btn" onclick="feedDuck(event)">TAP TO FEED 🌾</button>
    </div>

    <div class="market-panel">
        <div class="market-title">🏪 NFT DUCK MARKETPLACE</div>
        <div class="market-actions">
            <button class="market-btn" onclick="buyNewDuck()">BUY NEW DUCK 🦆</button>
            <button class="market-btn sell" onclick="sellCurrentDuck()">SELL DUCK 💰</button>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-item active">🏪 MARKET</div>
        <div class="nav-item">🦆 MY DUCKS</div>
        <div class="nav-item">💼 WALLET</div>
    </div>

    <script>
        // ஆட்டோ-சேவ் சிஸ்டம்
        let dmd = parseFloat(localStorage.getItem('m_dmd')) || 0.00;
        let corn = parseInt(localStorage.getItem('m_corn')) || 500;
        let rarity = localStorage.getItem('m_rarity') || 'COMMON';

        // கைடு பக்கம் 19-ன்படி ஒவ்வொரு வாத்தின் அசல் மதிப்பு (Market Price)
        const marketPrices = { 'COMMON': 150, 'UNCOMMON': 300, 'RARE': 600, 'EPIC': 1200, 'LEGENDARY': 3000 };
        const rewards = { 'COMMON': 0.01, 'UNCOMMON': 0.02, 'RARE': 0.04, 'EPIC': 0.5, 'LEGENDARY': 1.6 };
        const emojis = { 'COMMON': '🦆', 'UNCOMMON': '🪿', 'RARE': '🦅', 'EPIC': '🦉', 'LEGENDARY': '👑' };

        updateUI();

        function feedDuck(event) {
            if (corn <= 0) { alert("🌽 தீவனம் தீர்ந்துவிட்டது! வாத்தை மார்க்கெட்ல வித்து சோளம் வாங்கிக்கோங்க!"); return; }
            corn--;
            let earn = rewards[rarity];
            dmd += earn;
            save();
            updateUI();
            createFloatingText(event, "+" + earn + " $DMD");
        }

        // BUY SYSTEM: மார்க்கெட்டில் இருந்து புது வாத்து வாங்குவது (சோளம் குறையும்)
        function buyNewDuck() {
            let cost = marketPrices[rarity];
            if (corn < cost) {
                alert(`❌ இந்த வாத்தை வாங்க உங்களிடம் போதிய சோளம் இல்லை! தேவை: ${cost} 🌽`);
                return;
            }
            corn -= cost;
            alert(`🎉 வாழ்த்துகள்! மார்க்கெட்ல இருந்து ஒரு புது ${rarity} வாத்து வாங்கப்பட்டது!`);
            save();
            updateUI();
        }

        // SELL SYSTEM: கைடு பக்கம் 19-ன்படி வாத்தை விற்று உடனடியாக சோளம் பெறுவது
        function sellCurrentDuck() {
            let price = marketPrices[rarity];
            corn += price;
            alert(`💰 Success! உங்க ${rarity} வாத்தை மார்க்கெட்ல வித்து ${price} சோளம் 🌽 சம்பாதிச்சிட்டீங்க!`);
            
            // விற்ற பிறகு அடுத்த புதிய வாத்துக்கு மாறுவது
            const list = ['COMMON', 'UNCOMMON', 'RARE', 'EPIC', 'LEGENDARY'];
            rarity = list[(list.indexOf(rarity) + 1) % list.length];
            save();
            updateUI();
        }

        function save() {
            localStorage.setItem('m_dmd', dmd);
            localStorage.setItem('m_corn', corn);
            localStorage.setItem('m_rarity', rarity);
        }

        function updateUI() {
            document.getElementById('dmd-val').innerText = dmd.toFixed(2);
            document.getElementById('corn-val').innerText = corn;
            document.getElementById('duck-rarity').innerText = rarity;
            document.getElementById('duck-emoji').innerText = emojis[rarity];
            document.getElementById('duck-value').innerText = marketPrices[rarity];
        }

        function createFloatingText(event, txt) {
            const card = document.getElementById('card');
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = txt;
            text.style.left = '40%'; text.style.top = '30%';
            card.appendChild(text);
            setTimeout(() => { text.remove(); }, 500);
        }
    </script>
</body>
</html>
