<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DMD Duck Buy & Pay Pro</title>
    <style>
        body { 
            background-color: #0b0c10; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; margin: 0; padding: 0; display: flex; flex-direction: column; 
            justify-content: space-between; align-items: center; height: 100vh; 
            user-select: none; -webkit-user-select: none; overflow: hidden;
        }
        .header { width: 100%; padding-top: 10px; background: rgba(0,0,0,0.6); display: flex; justify-content: space-around; font-size: 15px; font-weight: bold; }
        .stat-box { background: #1f2833; padding: 6px 10px; border-radius: 10px; border: 1px solid #ffcc00; }
        
        .card-container {
            background: #1f2833; width: 85%; max-width: 340px; border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8); border: 2px solid #ffcc00; position: relative; margin-top: 10px;
        }
        .badge { position: absolute; top: 12px; left: 12px; background: #c5a059; color: #000; font-weight: bold; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
        .slot-count { position: absolute; top: 12px; right: 12px; color: #00ffcc; font-weight: bold; font-size: 11px; }
        
        .duck-avatar { font-size: 85px; margin: 15px 0 10px 0; transition: transform 0.05s ease; cursor: pointer; }
        .duck-avatar:active { transform: scale(0.9); }
        
        .feed-btn {
            background: linear-gradient(135deg, #ffcc00, #ff9900); color: #000; border: none;
            padding: 12px 0; font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; margin-bottom: 8px;
        }
        .pay-btn {
            background: linear-gradient(135deg, #ff4d4d, #cc0000); color: #fff; border: none;
            padding: 10px 0; font-size: 14px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%;
        }

        /* பை செக்ஷன் */
        .buy-panel { background: #151a21; width: 85%; padding: 10px; border-radius: 15px; border: 1px solid #232d38; margin: 10px 0; }
        .buy-title { font-size: 12px; color: #ffcc00; font-weight: bold; margin-bottom: 8px; }
        .btn-grid { display: flex; gap: 8px; justify-content: center; }
        .action-mini-btn { background: #1f2833; color: #fff; border: 1px solid #444; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }

        .floating-text { position: absolute; color: #00ffcc; font-weight: bold; font-size: 20px; animation: floatUp 0.5s ease-out forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }

        .footer-nav { background: #151a21; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #232d38; }
        .nav-item { font-size: 11px; color: #66788a; display: flex; flex-direction: column; align-items: center; font-weight: bold; }
        .nav-item.active { color: #ffcc00; }
    </style>
</head>
<body>

    <!-- டாப் நிலவரம் -->
    <div class="header">
        <div class="stat-box" style="color: #ffcc00;">🪙 <span id="dmd-val">0.00</span></div>
        <div class="stat-box" style="color: #ff9900;">🌽 <span id="corn-val">500</span></div>
        <div class="stat-box" style="color: #66c2ff;">⭐ <span id="stars-val">100</span></div>
    </div>

    <!-- மெயின் கார்டு -->
    <div class="card-container" id="card">
        <div class="badge" id="duck-type">COMMON (LVL 1)</div>
        <div class="slot-count" id="slot-display">SLOTS: 1/1</div>
        
        <div class="duck-avatar" onclick="feedDuck(event)">🦆</div>
        
        <button class="feed-btn" onclick="feedDuck(event)">TAP TO FEED 🌾</button>
        <!-- PAY FEE பட்டன் (கைடு பக்கம் 11 & 12) -->
        <button class="pay-btn" id="pay-breeding-btn" onclick="payBreedingFee()">PAY BREEDING FEE (100 🌽)</button>
    </div>

    <!-- BUY & UPGRADE பேனல் (கைடு பக்கம் 2 & 19) -->
    <div class="buy-panel">
        <div class="buy-title">🎰 SHOP & UPGRADES (BUY SYSTEM)</div>
        <div class="btn-grid">
            <button class="action-mini-btn" onclick="buySlot()">BUY SLOT (<span id="slot-cost">20</span> ⭐)</button>
            <button class="action-mini-btn" onclick="buyStars()">FREE ⭐ REWARD</button>
            <button class="action-mini-btn" onclick="changeRarity()">NEXT DUCK 🔄</button>
        </div>
    </div>

    <!-- மெனு பார் -->
    <div class="footer-nav">
        <div class="nav-item"><span style="font-size:16px;">🏪</span>MARKET</div>
        <div class="nav-item active"><span style="font-size:16px;">🦆</span>DUCKS</div>
        <div class="nav-item"><span style="font-size:16px;">💼</span>WALLETS</div>
    </div>

    <script>
        // லோக்கல் மெமரி ஆட்டோ-சேவ்
        let dmd = parseFloat(localStorage.getItem('bp_dmd')) || 0.00;
        let corn = parseInt(localStorage.getItem('bp_corn')) || 500;
        let stars = parseInt(localStorage.getItem('bp_stars')) || 100;
        let slots = parseInt(localStorage.getItem('bp_slots')) || 1;
        let duckLvl = parseInt(localStorage.getItem('bp_duck_lvl')) || 1;
        let rarity = localStorage.getItem('bp_rarity') || 'COMMON';

        const rewards = { 'COMMON': 0.01, 'UNCOMMON': 0.02, 'RARE': 0.04, 'EPIC': 0.5, 'LEGENDARY': 1.6 };
        const emojis = { 'COMMON': '🦆', 'UNCOMMON': '🪿', 'RARE': '🦅', 'EPIC': '🦉', 'LEGENDARY': '👑' };

        updateUI();

        function feedDuck(event) {
            if (corn <= 0) { alert("🌽 சோளம் காலி! BREEDING FEE செலுத்தி போனஸ் சோளம் பெறுங்கள்!"); return; }
            corn--;
            let earn = rewards[rarity] * duckLvl;
            dmd += earn;
            save();
            updateUI();
            createFloatingText(event, "+" + earn.toFixed(2) + " $DMD");
        }

        // PAY FEE சிஸ்டம்: சோளத்தை கட்டணமாக செலுத்தி வாத்தின் லெவலை உயர்த்துவது
        function payBreedingFee() {
            let fee = duckLvl === 1 ? 100 : 500; // கைடு பக்கம் 11-ன்படி கட்டணம்
            if (corn < fee) { alert("ஐயோ! இந்த கட்டணத்தை செலுத்த உங்களிடம் போதுமான சோளம் 🌽 இல்லை!"); return; }
            
            corn -= fee;
            duckLvl++;
            alert(`🎉 Success! பிரீடிங் கட்டணம் செலுத்தப்பட்டது. உங்க வாத்து இப்போ Level ${duckLvl}-க்கு மாஸா அப்டேட் ஆகிடுச்சு!`);
            save();
            updateUI();
        }

        // BUY SYSTEM: ஸ்டார்ஸ் கொடுத்து புதிய ஸ்லாட்டுகளை வாங்குவது
        function buySlot() {
            let cost = 20 + (slots - 1) * 20; // கைடு பக்கம் 2: "Each subsequent slot costs 20 Stars more"
            if (stars < cost) { alert("⭐ உங்களிடம் போதுமான ஸ்டார்ஸ் இல்லை!"); return; }
            
            stars -= cost;
            slots++;
            alert("🎰 மாஸ் தலைவா! புதிய வாத்து வளர்ப்பு ஸ்லாட் வாங்கப்பட்டு விட்டது!");
            save();
            updateUI();
        }

        function buyStars() {
            stars += 50;
            alert("🎁 போனஸ்: 50 இலவச ஸ்டார்ஸ் ⭐ வாலட்டில் வரவு வைக்கப்பட்டது!");
            save();
            updateUI();
        }

        function changeRarity() {
            const list = ['COMMON', 'UNCOMMON', 'RARE', 'EPIC', 'LEGENDARY'];
            rarity = list[(list.indexOf(rarity) + 1) % list.length];
            duckLvl = 1; // புதிய வாத்துக்கு லெவல் ரீசெட்
            save();
            updateUI();
        }

        function save() {
            localStorage.setItem('bp_dmd', dmd);
            localStorage.setItem('bp_corn', corn);
            localStorage.setItem('bp_stars', stars);
            localStorage.setItem('bp_slots', slots);
            localStorage.setItem('bp_duck_lvl', duckLvl);
            localStorage.setItem('bp_rarity', rarity);
        }

        function updateUI() {
            document.getElementById('dmd-val').innerText = dmd.toFixed(2);
            document.getElementById('corn-val').innerText = corn;
            document.getElementById('stars-val').innerText = stars;
            document.getElementById('duck-type').innerText = `${rarity} (LVL ${duckLvl})`;
            document.getElementById('slot-display').innerText = `SLOTS: 1/${slots}`;
            
            let nextFee = duckLvl === 1 ? 100 : 500;
            document.getElementById('pay-breeding-btn').innerText = `PAY BREEDING FEE (${nextFee} 🌽)`;
            
            let nextSlotCost = 20 + (slots - 1) * 20;
            document.getElementById('slot-cost').innerText = nextSlotCost;
        }

        function createFloatingText(event, txt) {
            const card = document.getElementById('card');
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = txt;
            text.style.left = '40%'; text.style.top = '30%';
            card.appendChild(text);
            setTimeout(() => { text.remove(); }, 500);
        }
    </script>
</body>
</html>
